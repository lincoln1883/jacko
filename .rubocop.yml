# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# Enhanced house style rules based on project requirements
plugins:
  - rubocop-rails

AllCops:
  NewCops: enable
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'node_modules/**/*'
    - 'vendor/**/*'
    - 'tmp/**/*'

# Documentation is optional for this project
Style/Documentation:
  Enabled: false

# Keep methods reasonably sized
Metrics/MethodLength:
  Max: 15
  Exclude:
    - 'db/migrate/**/*'

# Allow longer blocks in tests and routes
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'test/**/*'
    - 'config/routes.rb'
    - 'config/environments/*.rb'
    - 'config/initializers/*.rb'

# Set line length to 120 for better readability
Layout/LineLength:
  Max: 120
  Exclude:
    - 'config/**/*'
    - 'db/migrate/**/*'
    - 'Gemfile'

# Disable Rails/FilePath as it can be overly restrictive
Rails/FilePath:
  Enabled: false

# Additional formatting rules
Layout/SpaceInsideArrayLiteralBrackets:
  EnforcedStyle: no_space

Layout/SpaceInsideHashLiteralBraces:
  Enabled: true
  EnforcedStyle: no_space

Layout/IndentationConsistency:
  Enabled: true
  EnforcedStyle: normal

Layout/IndentationWidth:
  Enabled: true
  Width: 2

Layout/EmptyLinesAroundAccessModifier:
  Enabled: true

Style/FrozenStringLiteralComment:
  Enabled: true

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: double_quotes
  Include:
    - "**/*"
